description: "Contains all required information to open a connection to a service\
        \ defined by componentName parameter."
type: "object"
required:
  - "name"
  - "componentName"
  - "connectionVersion"
  - "parameters"
properties:
  active:
    description: "If a connection is used in any of active workflows."
    type: "boolean"
    readOnly: true
  authorizationType:
    $ref: "../../../../../../platform-configuration/platform-configuration-rest/platform-configuration-rest-impl/openapi.yaml#/components/schemas/AuthorizationType"
  authorizationParameters:
    description: "The authorization parameters of a connection."
    type: "object"
    additionalProperties: true
    readOnly: true
  baseUri:
    description: "The base URI of a connection."
    type: "string"
  componentName:
    description: "The name of a component that uses this connection."
    type: "string"
  connectionParameters:
    description: "The connection parameters of a connection."
    type: "object"
    additionalProperties: true
    readOnly: true
  connectionVersion:
    description: "The version of a component that uses this connection."
    type: "integer"
  createdBy:
    description: "The created by."
    type: "string"
    readOnly: true
  createdDate:
    description: "The created date."
    type: "string"
    format: "date-time"
    readOnly: true
  credentialStatus:
    $ref: "./credential_status.yaml"
  environmentId:
    description: "The id of an environment."
    type: "integer"
    format: "int64"
  id:
    description: "The id of a connection."
    type: "integer"
    format: "int64"
    readOnly: true
  lastModifiedBy:
    description: "The last modified by."
    type: "string"
    readOnly: true
  lastModifiedDate:
    description: "The last modified date."
    type: "string"
    format: "date-time"
    readOnly: true
  name:
    description: "The name of a connection."
    type: "string"
  parameters:
    description: "The parameters of a connection."
    type: "object"
    additionalProperties: true
    writeOnly: true
  sharedProjectIds:
    description: "IDs of projects this connection is shared with. Typically populated when visibility is PROJECT."
    type: "array"
    items:
      type: "integer"
      format: "int64"
    readOnly: true
  tags:
    type: "array"
    items:
      $ref: "../../../../../../platform-tag/platform-tag-rest/openapi/components/schemas/objects/tag.yaml"
  status:
    description: "Lifecycle state of the connection. ACTIVE is the normal operating state.\
            \ PENDING_REASSIGNMENT indicates the owner was removed from the workspace and the\
            \ connection awaits reassignment. REVOKED is terminal and cannot transition back."
    type: "string"
    enum:
      - "ACTIVE"
      - "PENDING_REASSIGNMENT"
      - "REVOKED"
    readOnly: true
  visibility:
    description: "Visibility scope controlling which users can see and use a connection.\
            \ Accepted on create: PRIVATE (default) or WORKSPACE \u2014 setting WORKSPACE requires\
            \ ROLE_ADMIN. PROJECT and ORGANIZATION are assigned by share / organization flows,\
            \ not by direct client request. On CE or embedded surfaces the server always forces\
            \ PRIVATE regardless of the request body."
    type: "string"
    enum:
      - "PRIVATE"
      - "PROJECT"
      - "WORKSPACE"
      - "ORGANIZATION"
  __version:
    type: "integer"
    format: "int32"
