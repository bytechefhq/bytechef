          schema:
            $ref: '#/components/schemas/Environment'
        - name: "integrationId"
          description: "The project ids used for filtering project instances."
          in: "query"
          required: false
          schema:
            type: "integer"
            format: "int64"
        - name: "tagId"
          description: "The tag id of used for filtering integration instance configurations."
          in: "query"
          required: false
          schema:
            type: "integer"
            format: "int64"
      responses:
        "200":
          description: "A list of integration instance configurations."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/IntegrationInstanceConfiguration"
    post:
      description: "Create a new integration instance configuration."
      summary: "Create a new integration instance configuration"
      tags:
        - "integration-instance-configuration"
      operationId: "createIntegrationInstanceConfiguration"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationInstanceConfiguration"
        required: true
      responses:
        "200":
          description: "The integration instance configuration object."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationInstanceConfiguration"
