components:
  schemas:
    AppEvent:
      description: "An app event."
      required:
        - "name"
        - "schema"
      properties:
        createdBy:
          description: "The created by."
          type: "string"
          readOnly: true
        createdDate:
          description: "The created date."
          type: "string"
          format: "date-time"
          readOnly: true
        id:
          description: "The id of the category."
          type: "integer"
          format: "int64"
        name:
          description: "The name of the category."
          type: "string"
        lastModifiedBy:
          description: "The last modified by."
          type: "string"
          readOnly: true
        lastModifiedDate:
          description: "The last modified date."
          type: "string"
          format: "date-time"
          readOnly: true
        schema:
          description: "The schema of an event."
          type: "string"
        __version:
          type: "integer"
          format: "int32"
    Category:
      description: "A category."
      required:
      - "name"
      properties:
        createdBy:
          description: "The created by."
          type: "string"
          readOnly: true
        createdDate:
          description: "The created date."
          type: "string"
          format: "date-time"
          readOnly: true
        id:
          description: "The id of the category."
          type: "integer"
          format: "int64"
        name:
          description: "The name of the category."
          type: "string"
        lastModifiedBy:
          description: "The last modified by."
          type: "string"
          readOnly: true
        lastModifiedDate:
          description: "The last modified date."
          type: "string"
          format: "date-time"
          readOnly: true
        __version:
          type: "integer"
          format: "int32"
    Environment:
      description: "The environment of an integration."
      type: "string"
      enum:
        - "DEVELOPMENT"
        - "STAGING"
        - "PRODUCTION"
    Integration:
      description: "A group of workflows that make one logical integration."
      type: "object"
      allOf:
        - $ref: "#/components/schemas/IntegrationBasic"
        - type: "object"
          properties:
            category:
              $ref: "#/components/schemas/Category"
            tags:
              type: "array"
              items:
                $ref: "#/components/schemas/Tag"
            workflowIds:
              description: "The workflow ids belonging to this integration."
              type: "array"
              items:
                type: "string"
                readOnly: true
            __version:
              type: "integer"
    IntegrationBasic:
      description: "A group of workflows that make one logical integration."
      type: "object"
      required:
        - "allowMultipleInstances"
        - "componentName"
        - "componentVersion"
      properties:
        allowMultipleInstances:
          description: "If multiple instances of an integration are allowed or not."
          type: "boolean"
          default: false
        componentName:
          description: "The name of the integration's component."
          type: "string"
        componentVersion:
          description: "The version of the integration's component."
          type: "integer"
        createdBy:
          description: "The created by."
          type: "string"
          readOnly: true
        createdDate:
          description: "The created date."
          type: "string"
          format: "date-time"
          readOnly: true
        description:
          description: "The description of a project."
          type: "string"
        id:
          description: "The id of an integration."
          type: "integer"
          format: "int64"
          readOnly: true
        lastModifiedBy:
          description: "The last modified by."
          type: "string"
          readOnly: true
        lastModifiedDate:
          description: "The last modified date."
          type: "string"
          format: "date-time"
          readOnly: true
        publishedDate:
          description: "The published date."
          type: "string"
          format: "date-time"
        integrationVersion:
          description: "The version of an integration."
          type: "integer"
        status:
          $ref: '#/components/schemas/IntegrationStatus'
    IntegrationInstance:
      description: "Contains configurations and connections required for the execution\
        \ of integration workflows for a connected user."
      type: "object"
      allOf:
        - $ref: "#/components/schemas/IntegrationInstanceBasic"
        - type: "object"
          properties:
            integrationInstanceConfiguration:
              type: "object"
              allOf:
                - $ref: "#/components/schemas/IntegrationInstanceConfigurationBasic"
              readOnly: true
            __version:
              type: "integer"
    IntegrationInstanceBasic:
      description: "Contains configurations and connections required for the execution\
        \ of integration workflows for a connected user."
      type: "object"
      required:
        - "connectionId"
        - "name"
      properties:
        connectionId:
          description: "The id of a connection."
