---
openapi: "3.0.1"
info:
  title: "Todoist"
  description: "Todoist is a task management application that helps users organize and prioritize their to-do lists."
  version: "v1"
servers:
  - url: "https://api.todoist.com/api/v1"
paths:
  /tasks:
    post:
      summary: "Create Task"
      description: "Creates a new task."
      operationId: "createTask"
      x-ai-agent-tool: true
      x-help: "https://docs.bytechef.io/reference/components/todoist_v1#create-task"
      security:
        - "oauth2":
            - "task:add"
            - "data:read"
      requestBody:
        content:
          application/json:
            schema:
              type: "object"
              title: "Contact"
              required:
                - "content"
              properties:
                content:
                  type: "string"
                  description: "Task content."
                description:
                  type: "string"
                  description: "A description for the task."
                project_id:
                  type: "string"
                  description: "ID of the project to add the task to. If not set, task is put to user's Inbox."
                  title: "Project ID"
                  x-dynamic-options: true
                priority:
                  type: "integer"
                  description: "Task priority from 1 (normal) to 4 (urgent)."
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                labels:
                  type: "array"
                  description: "List of labels to be applied to the task."
                  items:
                    type: "string"
                  x-dynamic-options: true
                section_id:
                  type: "string"
                  description: "ID of the section to add the task to."
                  title: "Section ID"
                  x-dynamic-options: true
                  x-dynamic-options-dependency:
                    - "project_id"
                parent_id:
                  type: "string"
                  description: "ID of the parent task."
                  title: "Parent Task ID"
      responses:
        200:
          description: "Successful operation"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  user_id:
                    type: "string"
                    description: "ID of the user."
                  id:
                    type: "string"
                    description: "ID of the task."
                  project_id:
                    type: "string"
                    description: "ID of the project."
                  section_id:
                    type: "string"
                    description: "ID of the section."
                  parent_id:
                    type: "string"
                    description: "ID of the parent task."
                  labels:
                    type: "array"
                    description: "List of labels applied to the task."
                    items:
                      type: "string"
                  checked:
                    type: "boolean"
                    description: "Whether the task is checked."
                  is_deleted:
                    type: "boolean"
                    description: "Whether the task is deleted."
                  content:
                    type: "string"
                    description: "Task content."
                  description:
                    type: "string"
                    description: "Task description."
                  priority:
                    type: "integer"
                    description: "Task priority."
  /tasks/{taskId}/close:
    post:
      summary: "Mark Task as Completed"
      description: "Marks a task as being completed."
      operationId: "markTaskCompleted"
      x-ai-agent-tool: true
      x-help: "https://docs.bytechef.io/reference/components/todoist_v1#mark-task-completed"
      security:
        - "oauth2":
            - "data:read_write"
      parameters:
        - name: "taskId"
          description: "ID of the task to be closed."
          in: "path"
          required: true
          schema:
            title: "Task ID"
            type: "string"
            x-dynamic-options: true
      responses:
        200:
          description: "Successful operation"
  /projects:
    post:
      summary: "Create Project"
      description: "Creates a new project."
      operationId: "createProject"
      x-ai-agent-tool: true
      x-help: "https://docs.bytechef.io/reference/components/todoist_v1#create-project"
      security:
        - "oauth2":
            - "data:read_write"
      requestBody:
        content:
          application/json:
            schema:
              type: "object"
              title: "Project"
              required:
                - "name"
              properties:
                name:
                  type: "string"
                  description: "Name of the project."
                description:
                  type: "string"
                  description: "Description of the project."
                parent_id:
                  type: "string"
                  description: "ID of the parent project."
                  title: "Parent Project ID"
                color:
                  type: "string"
                  description: "Color of the project icon."
                is_favorite:
                  type: "boolean"
                  title: "Is Project a Favorite?"
                  description: "Whether the project is a favorite."
                workspace_id:
                  type: "integer"
                  description: "ID of the workspace. If provided, creates a workspace project instead of a personal project."
                  title: "Workspace ID"
                  x-dynamic-options: true
      responses:
        200:
          description: "Successful operation"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  id:
                    type: "string"
                    description: "ID of the project."
                  name:
                    type: "string"
                    description: "Name of the project."
                  description:
                    type: "string"
                    description: "Description of the project."
                  color:
                    type: "string"
                    description: "Color of the project icon."
                  is_favorite:
                    type: "string"
                    description: "Whether the project is a favorite."
                  url:
                    type: "string"
                    description: "URL of the project."
                  parent_id:
                    type: "string"
                    description: "ID of the parent project."
components:
  securitySchemes:
    oauth2:
      type: "oauth2"
      flows:
        authorizationCode:
          authorizationUrl: "https://todoist.com/oauth/authorize"
          tokenUrl: "https://todoist.com/oauth/access_token"
          scopes:
            task:add: "Grants permission to add new tasks (the application cannot read or modify any existing data)."
            data:read: "Grants read-only access to application data, including tasks, projects, labels, and filters."
            data:read_write: "Grants read and write access to application data, including tasks, projects, labels, and filters. This scope includes task:add and data:read scopes."
            data:delete: "Grants permission to delete application data, including tasks, labels, and filters."
            project:delete: "Grants permission to delete projects."
            backups:read: "Grants permission to list backups bypassing MFA requirements."
