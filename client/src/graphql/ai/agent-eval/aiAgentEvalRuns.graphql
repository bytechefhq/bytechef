query aiAgentEvalRuns($agentEvalTestId: ID!, $limit: Int, $offset: Int) {
    aiAgentEvalRuns(agentEvalTestId: $agentEvalTestId, limit: $limit, offset: $offset) {
        id
        name
        status
        averageScore
        totalScenarios
        completedScenarios
        startedDate
        completedDate
        createdDate
    }
}
