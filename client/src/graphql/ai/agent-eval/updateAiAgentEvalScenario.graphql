mutation updateAiAgentEvalScenario($id: ID!, $name: String, $userMessage: String, $expectedOutput: String, $personaPrompt: String, $maxTurns: Int, $numberOfRuns: Int) {
    updateAiAgentEvalScenario(id: $id, name: $name, userMessage: $userMessage, expectedOutput: $expectedOutput, personaPrompt: $personaPrompt, maxTurns: $maxTurns, numberOfRuns: $numberOfRuns) {
        id
        name
        type
        userMessage
        expectedOutput
        personaPrompt
        maxTurns
        numberOfRuns
        judges {
            id
            name
            type
            configuration
            createdDate
            lastModifiedDate
        }
        createdDate
        lastModifiedDate
    }
}
