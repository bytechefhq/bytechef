mutation startAgentEvalRun($agentEvalTestId: ID!, $name: String!, $environmentId: ID!) {
    startAgentEvalRun(agentEvalTestId: $agentEvalTestId, name: $name, environmentId: $environmentId) {
        id
        name
        status
        totalScenarios
        completedScenarios
        createdDate
    }
}
