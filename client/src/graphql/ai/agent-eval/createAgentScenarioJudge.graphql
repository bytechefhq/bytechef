mutation createAgentScenarioJudge($agentEvalScenarioId: ID!, $name: String!, $type: AgentJudgeType!, $configuration: Map!) {
    createAgentScenarioJudge(agentEvalScenarioId: $agentEvalScenarioId, name: $name, type: $type, configuration: $configuration) {
        id
        name
        type
        configuration
        createdDate
        lastModifiedDate
    }
}
