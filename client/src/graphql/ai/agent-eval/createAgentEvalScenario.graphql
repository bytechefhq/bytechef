mutation createAgentEvalScenario($agentEvalTestId: ID!, $name: String!, $type: AgentScenarioType!, $userMessage: String, $expectedOutput: String, $personaPrompt: String, $maxTurns: Int) {
    createAgentEvalScenario(agentEvalTestId: $agentEvalTestId, name: $name, type: $type, userMessage: $userMessage, expectedOutput: $expectedOutput, personaPrompt: $personaPrompt, maxTurns: $maxTurns) {
        id
        name
        type
        userMessage
        expectedOutput
        personaPrompt
        maxTurns
        judges {
            id
            name
            type
            configuration
            createdDate
            lastModifiedDate
        }
        createdDate
        lastModifiedDate
    }
}
