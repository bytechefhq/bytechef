mutation updateAgentScenarioToolSimulation($id: ID!, $toolName: String, $responsePrompt: String, $simulationModel: String) {
    updateAgentScenarioToolSimulation(id: $id, toolName: $toolName, responsePrompt: $responsePrompt, simulationModel: $simulationModel) {
        id
        toolName
        responsePrompt
        simulationModel
    }
}
