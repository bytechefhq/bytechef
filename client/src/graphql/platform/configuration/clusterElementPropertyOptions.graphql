query clusterElementPropertyOptions(
    $componentName: String!
    $componentVersion: Int!
    $clusterElementName: String!
    $propertyName: String!
    $connectionId: Long
    $inputParameters: Map
    $lookupDependsOnPaths: [String!]
) {
    clusterElementPropertyOptions(
        componentName: $componentName
        componentVersion: $componentVersion
        clusterElementName: $clusterElementName
        propertyName: $propertyName
        connectionId: $connectionId
        inputParameters: $inputParameters
        lookupDependsOnPaths: $lookupDependsOnPaths
    ) {
        description
        label
        value
    }
}
